<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta http-equiv="Content-Language" content="en" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nordic Insights</title>
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/Nordic insights app icon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              surface: {
                50: '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
              },
              nordic: {
                dark: '#0f172a',
                blue: '#2563eb', // Standard corporate blue
                success: '#10b981',
                warning: '#f59e0b',
                danger: '#ef4444',
              }
            },
            fontFamily: {
              sans: ['Inter', 'Segoe UI', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out forwards',
              'slide-up': 'slideUp 0.4s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #f8fafc; /* Slate 50 */
        color: #0f172a; /* Slate 900 */
      }
      /* Dark mode overrides */
      html.dark body {
        background-color: #0f172a;
        color: #e2e8f0;
      }
      html.dark .bg-slate-50 { background-color: #0f172a !important; }
      html.dark .bg-white, html.dark .bg-white\/80 { background-color: #1e293b !important; }
      html.dark .bg-slate-100 { background-color: #1e293b !important; }
      html.dark .bg-slate-200 { background-color: #334155 !important; }
      html.dark .text-slate-900 { color: #f1f5f9 !important; }
      html.dark .text-slate-800 { color: #e2e8f0 !important; }
      html.dark .text-slate-700 { color: #cbd5e1 !important; }
      html.dark .text-slate-600 { color: #94a3b8 !important; }
      html.dark .text-slate-500 { color: #64748b !important; }
      html.dark .border-slate-200 { border-color: #334155 !important; }
      html.dark .border-slate-300 { border-color: #475569 !important; }
      html.dark .ring-slate-900\/5 { --tw-ring-color: rgb(248 250 252 / 0.05) !important; }
      html.dark input, html.dark select, html.dark textarea {
        background-color: #1e293b !important;
        color: #e2e8f0 !important;
        border-color: #475569 !important;
      }
      html.dark input::placeholder, html.dark textarea::placeholder {
        color: #64748b !important;
      }
      html.dark .hover\:bg-slate-50:hover { background-color: #1e293b !important; }
      html.dark .hover\:bg-slate-100:hover { background-color: #334155 !important; }
      html.dark .hover\:bg-slate-200:hover { background-color: #475569 !important; }
      html.dark .hover\:bg-slate-200\/50:hover { background-color: rgba(51, 65, 85, 0.5) !important; }
      /* Dark scrollbar */
      html.dark ::-webkit-scrollbar-thumb { background: #475569; }
      html.dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
      /* Custom Scrollbar for light theme */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.263.1",
    "recharts": "https://esm.sh/recharts@2.12.0?external=react,react-dom",
    "zustand": "https://esm.sh/zustand@4.5.0?external=react",
    "clsx": "https://esm.sh/clsx@2.1.0",
    "tailwind-merge": "https://esm.sh/tailwind-merge@2.2.1",
    "react-markdown": "https://esm.sh/react-markdown@9.0.1?external=react",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@3.5.28",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

</body>
</html>
