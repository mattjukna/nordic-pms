# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - nordic-pms-prod-2026

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          PRISMA_CLI_BINARY_TARGETS: debian-openssl-3.0.x
        run: npx prisma generate

      - name: Build
        env:
          PRISMA_CLI_BINARY_TARGETS: debian-openssl-3.0.x
        run: npm run build

      - name: Run tests
        run: npm run test --if-present

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Stage deployment payload
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package
          cp package.json deploy-package/
          cp package-lock.json deploy-package/
          cp -R dist deploy-package/dist
          cp -R dist-server deploy-package/dist-server
          cp -R node_modules deploy-package/node_modules

      - name: Archive deployment payload
        run: |
          cd deploy-package
          zip -r ../release.zip .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            release.zip
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_22752BC860314E068BA1F71C80427A4D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_049380E1C4EA439097D21A016BD49BC3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E9A4A543190D466EA371C0BFA91A7D0D }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'nordic-pms-prod-2026'
          resource-group: 'rg-nordic-pms-prod'
          package: release.zip
          